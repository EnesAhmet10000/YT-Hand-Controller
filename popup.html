<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Hand Control</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup-container">
      <!-- Header -->
      <header class="popup-header">
        <div class="logo-row">
          <span class="logo-icon">🤚</span>
          <div class="title-group">
            <h1>YT Hand Control</h1>
            <p class="subtitle">v2.0 • Gesture Engine</p>
          </div>
        </div>
        
        <div class="top-actions-wrapper">
          <select id="langSelect" class="lang-select">
            <option value="tr">TR</option>
            <option value="en">EN</option>
            <option value="ar">AR</option>
          </select>
          <a href="https://www.linkedin.com/in/enesahmet10000" target="_blank" rel="noopener noreferrer" class="linkedin-icon" title="LinkedIn Profile">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
            </svg>
          </a>
        </div>
      </header>

      <!-- Camera Toggle Card -->
      <section class="card toggle-card">
        <div class="toggle-row">
          <div class="status-indicator">
            <span id="statusDot" class="dot off"></span>
            <span id="statusLabel" class="status-text">Kapalı</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="cameraToggle" />
            <span class="slider"></span>
          </label>
        </div>
      </section>

      <!-- Gesture Settings Card -->
      <section class="card gestures-card">
        <h2>Hareket Ayarları</h2>
        <div class="gesture-settings" id="gestureSettings">
          <!-- JS tarafından doldurulacak -->
        </div>
      </section>

      <!-- Footer -->
      <footer class="popup-footer">
        <span>v2.0 • MediaPipe Hands</span>
      </footer>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
